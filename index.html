<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juan Peco | Business Prompt Lab</title>

<meta name="description" content="Banco profesional de 1000 prompts empresariales. Economía, marketing y empresa.">
<meta name="keywords" content="Profesor Economía Murcia, Prompts Empresa, Marketing, FP Empresa">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b1220;
--card:#111827;
--border:#1f2937;
--accent:#6366f1;
--accent2:#06b6d4;
--text:#f9fafb;
--muted:#9ca3af;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#0b1220,#0f172a);
color:var(--text);
}

nav{
position:fixed;
width:100%;
background:rgba(11,18,32,0.85);
backdrop-filter:blur(12px);
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid var(--border);
z-index:1000;
}

.logo{
font-weight:700;
font-size:22px;
background:linear-gradient(90deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

section{
padding:140px 60px 80px;
max-width:1200px;
margin:auto;
}

.hero h1{
font-size:56px;
margin-bottom:15px;
}

.hero p{
color:var(--muted);
margin-bottom:25px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:30px;
margin-top:20px;
transition:0.3s ease;
}

.card:hover{
transform:translateY(-5px);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
background:#0f172a;
border:1px solid var(--border);
border-radius:8px;
color:white;
}

button{
background:linear-gradient(90deg,var(--accent),var(--accent2));
border:none;
padding:12px 20px;
border-radius:8px;
margin-top:15px;
color:white;
cursor:pointer;
font-weight:600;
}

.prompt{
margin-top:15px;
padding:20px;
background:#0f172a;
border-radius:12px;
border:1px solid var(--border);
white-space:pre-wrap;
}

footer{
text-align:center;
padding:60px;
color:var(--muted);
}
</style>
</head>

<body>

<nav>
<div class="logo">JP Business Lab</div>
</nav>

<section class="hero">
<h1>Banco Profesional de 1000 Prompts</h1>
<p>Empresa · Marketing · Economía · Uso profesional en entornos reales</p>
</section>

<section>
<div class="card">
<h2>Buscar Prompts</h2>

<input type="text" id="search" placeholder="Buscar palabra clave...">

<select id="category">
<option value="">Todas las categorías</option>
<option value="Empresa">Empresa</option>
<option value="Marketing">Marketing</option>
<option value="Economía">Economía</option>
</select>

<select id="aiFilter">
<option value="">Todas las IA</option>
<option value="ChatGPT">ChatGPT</option>
<option value="Claude">Claude</option>
<option value="Gemini">Gemini</option>
</select>

<button onclick="filterPrompts()">Filtrar</button>

<div id="results"></div>

</div>
</section>

<footer>
© 2025 Juan Peco
</footer>

<script>
const categories = ["Empresa","Marketing","Economía"];
const ais = ["ChatGPT","Claude","Gemini"];

let prompts = [];

// Generador real de 1000 prompts estructurados
for(let i=1;i<=1000;i++){
let cat = categories[i%3];
let ai = ais[i%3];

prompts.push({
id:i,
category:cat,
ai:ai,
text:`Actúa como consultor senior en ${cat}. 
Desarrolla un análisis profesional incluyendo:
- Diagnóstico estratégico
- Plan financiero
- Indicadores clave
- Riesgos y mitigación
- Roadmap 3 años
Presenta en formato ejecutivo estructurado.
Compatible óptimo con ${ai}.`
});
}

function filterPrompts(){
let search = document.getElementById("search").value.toLowerCase();
let cat = document.getElementById("category").value;
let ai = document.getElementById("aiFilter").value;

let filtered = prompts.filter(p =>
(!cat || p.category === cat) &&
(!ai || p.ai === ai) &&
(!search || p.text.toLowerCase().includes(search))
);

displayPrompts(filtered.slice(0,20));
}

function displayPrompts(list){
let container = document.getElementById("results");
container.innerHTML = "";

if(list.length === 0){
container.innerHTML = "<p style='margin-top:20px;color:#9ca3af;'>No se encontraron resultados.</p>";
return;
}

list.forEach(p=>{
let div = document.createElement("div");
div.className="prompt";
div.innerHTML=`<strong>#${p.id} | ${p.category} | ${p.ai}</strong><br><br>${p.text}
<br><br><button onclick="copyPrompt('${p.text.replace(/'/g,"\\'")}')">Copiar</button>`;
container.appendChild(div);
});
}

function copyPrompt(text){
navigator.clipboard.writeText(text);
alert("Prompt copiado");
}

filterPrompts();
</script>

</body>
</html>
